    <rect x="762" width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
    <rect y="184" width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
    <rect x="254" y="184" width="232" height="160" rx="28" fill="rgba(110,231,216,0.16)"/>
    <rect x="508" y="184" width="232" height="160" rx="28" fill="rgba(255,203,107,0.16)"/>
    <rect x="762" y="184" width="232" height="160" rx="28" fill="rgba(135,167,255,0.16)"/>
    <rect y="368" width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
    <rect x="254" y="368" width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
    <rect x="508" y="368" width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
    <rect x="762" y="368" width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
    <circle cx="116" cy="72" r="28" fill="url(#g2)"/>
    <circle cx="370" cy="72" r="28" fill="url(#g2)"/>
    <circle cx="624" cy="72" r="28" fill="url(#g2)"/>
    <circle cx="878" cy="72" r="28" fill="url(#g2)"/>
    <text x="45" y="264" fill="#edf4ff" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">drink</text>
    <text x="298" y="264" fill="#edf4ff" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">snack</text>
    <text x="548" y="264" fill="#edf4ff" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">fruit</text>
    <text x="806" y="264" fill="#edf4ff" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">meal</text>
