<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">AAC board screenshot</title>
  <desc id="desc">A communication board with icon tiles, a message bar, and a calm high contrast theme.</desc>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11213e"/>
      <stop offset="100%" stop-color="#08111f"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7d8"/>
      <stop offset="100%" stop-color="#87a7ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#g1)"/>
  <rect x="40" y="40" width="1120" height="820" rx="34" fill="#111d34" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="78" y="74" width="104" height="40" rx="20" fill="rgba(110,231,216,0.14)"/>
  <text x="100" y="100" fill="#6ee7d8" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Food</text>
  <rect x="78" y="140" width="1044" height="104" rx="24" fill="#172848"/>
  <text x="108" y="200" fill="#edf4ff" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="700">I want a snack</text>
  <text x="108" y="228" fill="#a8b8d6" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Sentence bar with consistent core word placement</text>
  <g transform="translate(78 280)">
    <rect width="232" height="160" rx="28" fill="rgba(255,255,255,0.05)"/>
